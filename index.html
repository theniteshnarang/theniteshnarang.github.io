<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/n-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nitesh Narang — engineer, founder, builder. Shipping products that matter."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Nitesh Narang</title>
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (
          t === "dark" ||
          (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
